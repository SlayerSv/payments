syntax = "proto3";
package auth;
option go_package = "github.com/SlayerSv/payments/gen/auth";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service UserService {
    rpc Get (google.protobuf.Empty) returns (UserResponse);
    rpc GetByEmail (GetByEmailRequest) returns (UserResponse);
    rpc GetEmails (GetEmailsRequest) returns (GetEmailsResponse);
    rpc Update (UpdateRequest) returns (UserResponse);
}

message GetByEmailRequest { string email = 1; }

message GetEmailsRequest {
    repeated string ids = 1;
}

message GetEmailsResponse {
    map<string, string> emails = 1;
}

message UpdateRequest {
    optional string new_name = 2;
    optional string new_password = 3;
}

message UserResponse {
    string id = 1;
    string email = 2;
    string name = 3;
    google.protobuf.Timestamp created_at = 4;
    google.protobuf.Timestamp updated_at = 5;
}

service AuthService {
  rpc Register (RegisterRequest) returns (google.protobuf.Empty);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Restore (RestoreRequest) returns (RestoreResponse);
}

message RestoreRequest { string email = 1; }
message RestoreResponse { string status = 1; }

message RegisterRequest { string email = 1; }

message LoginRequest {
  string email = 1;
  string password = 2;
}
message LoginResponse { string token = 1; }
