syntax = "proto3";

package wallet;

// Укажи здесь путь, куда сгенерируются Go-файлы
option go_package = "github.com/SlayerSv/payments/gen/wallet";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service WalletService {
  // Главный метод для транзакций (Пополнение/Списание/Перевод)
  rpc ProcessOperation(ProcessOperationRequest) returns (ProcessOperationResponse);
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetAll(GetAllRequest) returns (GetAllResponse);
  rpc Delete(DeleteRequest) returns (google.protobuf.Empty);
}

// --- Process Operation ---
message ProcessOperationRequest {
  string idempotency_key = 1; // Уникальный ключ (txID + суффикс)
  string transaction_id = 2;  // ID транзакции для логов/аутбокса
  string account_id = 3;      // ID кошелька
  int64 amount_delta = 4;     // Сумма изменения (положительная или отрицательная)
}

message ProcessOperationResponse {
  string id = 1;
  int64 new_balance = 2;
  string status = 3;
}

message Account {
  string id = 1;
  string owner_id = 2;
  int64 balance = 3;
  google.protobuf.Timestamp create_at = 4;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Account account = 1;
}

message GetAllRequest {
  string owner_id = 1;
}

message GetAllResponse {
  repeated Account accounts = 1;
}

message CreateRequest {
  string owner_id = 1;
}

message CreateResponse {
  string account_id = 1;
}

message DeleteRequest {
  string id = 1;
}
