syntax = "proto3";
package trans;
option go_package = "github.com/SlayerSv/payments/gen/trans";

import "google/protobuf/timestamp.proto";

service TransService {
    rpc Deposit (DepositRequest) returns (NewBalanceResponse);
    rpc Withdraw (WithdrawRequest) returns (NewBalanceResponse);
    rpc Transfer (TransferRequest) returns (NewBalanceResponse);
    rpc GetTransactionHistory (GetTransactionHistoryRequest) returns (GetTransactionHistoryResponse);
}

enum account_type {
    ACCOUNT_UNSPECIFIED = 0;
    WALLET = 1;
    SAVINGS = 2;
}

enum operation_type {
    OPERATION_UNSPECIFIED = 0;
    DEPOSIT = 1;
    WITHDRAW = 2;
    TRANSFER = 3;
}

message DepositRequest {
    string account_id = 1;
    account_type account_type = 2;
    int64 amount = 3;
}

message WithdrawRequest {
    string account_id = 1;
    account_type account_type = 2;
    int64 amount = 3;
}

message TransferRequest {
    string donor_account_id  = 1;
    account_type donor_account_type = 2;
    string receiver_account_id = 3;
    account_type receiver_account_type = 4;
    int64 amount = 5;
}

message NewBalanceResponse {
    int64 new_balance = 1;
}

message GetTransactionHistoryRequest {
    string account_id = 1;
}

message GetTransactionHistoryResponse {
    repeated Transaction transactions = 1;
}

message Transaction {
    string id = 1;
    operation_type op_type = 2;
    optional string donor_account_id = 3;
    optional account_type donor_account_type = 4;
    optional string receiver_account_id = 5;
    optional account_type receiver_account_type = 6;
    int64 amount = 7;
    google.protobuf.Timestamp created_at = 8;
}
