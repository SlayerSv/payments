syntax = "proto3";
package trans;
option go_package = "github.com/SlayerSv/payments/gen/trans";

import "google/protobuf/timestamp.proto";

service TransService {
    rpc Deposit (DepositRequest) returns (NewBalanceResponse);
    rpc Withdraw (WithdrawRequest) returns (NewBalanceResponse);
    rpc Transfer (TransferRequest) returns (NewBalanceResponse);
    rpc GetTransactionHistory (GetTransactionHistoryRequest) returns (GetTransactionHistoryResponse);
}

enum operation_type {
    OPERATION_UNSPECIFIED = 0;
    DEPOSIT = 1;
    WITHDRAW = 2;
    TRANSFER = 3;
}

message DepositRequest {
    string wallet_id = 1;
    int64 amount = 2;
}

message WithdrawRequest {
    string wallet_id = 1;
    int64 amount = 2;
}

message TransferRequest {
    string donor_wallet_id  = 1;
    string receiver_wallet_id = 2;
    int64 amount = 3;
}

message NewBalanceResponse {
    int64 new_balance = 1;
}

message GetTransactionHistoryRequest {
    string wallet_id = 1;
}

message GetTransactionHistoryResponse {
    repeated Transaction transactions = 1;
}

message Transaction {
    string id = 1;
    operation_type op_type = 2;
    optional string donor_wallet_id = 3;
    optional string receiver_wallet_id = 5;
    int64 amount = 7;
    google.protobuf.Timestamp created_at = 8;
}
