syntax = "proto3";
package trans;
option go_package = "github.com/SlayerSv/payments/gen/trans";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service TransService {
    rpc Deposit (DepositRequest) returns (google.protobuf.Empty);
    rpc Withdraw (WithdrawRequest) returns (google.protobuf.Empty);
    rpc Transfer (TransferRequest) returns (google.protobuf.Empty);
    rpc GetTransactionHistory (google.protobuf.Empty) returns (GetTransactionHistoryResponse);
}

enum account_type {
    ACCOUNT_UNSPECIFIED = 0;
    WALLET = 1;
    SAVINGS = 2;
}

enum operation_type {
    OPERATION_UNSPECIFIED = 0;
    DEPOSIT = 1;
    WITHDRAW = 2;
    TRANSFER = 3;
}

message DepositRequest {
    account_type account_type = 1;
    int64 amount = 2;
}

message WithdrawRequest {
    account_type account_type = 1;
    int64 amount = 2;
}

message TransferRequest {
    string sender_id  = 1;
    account_type sender_type = 2;
    string receiver_email = 3;
    account_type receiver_type = 4;
    int64 amount = 5;
}

message GetTransactionHistoryResponse {
    repeated Transaction transactions = 1;
}

message Transaction {
    string id = 1;
    operation_type op_type = 2;
    string sender_id = 3;
    account_type sender_type = 4;
    string receiver_id = 5;
    account_type receiver_type = 6;
    int64 amount = 7;
    google.protobuf.Timestamp created_at = 8;
}
