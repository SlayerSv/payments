services:
  db:
    image: postgres:17-alpine3.22
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Пробрасываем скрипт, который создаст auth, wallet и т.д.
      - ./init-db:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data

  openbao:
    image: openbao/openbao:2.5.3
    ports:
      - "8200:8200"
    # Для локальной разработки используем dev-сервер (всё в памяти, токен root)
    command: server -dev -dev-root-token-id="myroot"
    environment:
      - BAO_DEV_ROOT_TOKEN_ID=myroot

  bao-init:
    image: openbao/openbao:2.5.3
    depends_on:
      - openbao
    volumes:
      - ./init-bao.sh:/usr/local/bin/init-bao.sh
    environment:
      - BAO_ADDR=http://openbao:8200
      - BAO_TOKEN=myroot
    entrypoint: ["/bin/sh", "/usr/local/bin/init-bao.sh"]

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  gateway:
    image: slayersv/gateway:latest
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
    ports:
      - "8081:8081"
    environment:
      - BAO_ADDR=http://openbao:8200
      - AUTH_ADDR=auth:50051
      - USER_ADDR=auth:50051
      - TRANS_ADDR=trans:50052
      - WALLET_ADDR=wallet:50053
      - VICTORIA_LOGS_URL=http://victorialogs:9428
      - OTLP_ENDPOINT=http://victoriatraces:10428/insert/opentelemetry/v1/traces
    depends_on:
      - auth
      - trans
      - bao-init
      - kafka
      - victorialogs
      - victoriatraces

  auth:
    image: slayersv/auth:latest
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
    environment:
      - BAO_ADDR=http://openbao:8200
      - AUTH_DB_CONN=postgres://postgres:postgres@db:5432/auth?sslmode=disable
      - VICTORIA_LOGS_URL=http://victorialogs:9428
      - OTLP_ENDPOINT=http://victoriatraces:10428/insert/opentelemetry/v1/traces
    env_file:
      - .env
    depends_on:
      - db
      - bao-init
      - victorialogs
      - victoriatraces

  trans:
    image: slayersv/trans:latest
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: trans
    environment:
      - BAO_ADDR=http://openbao:8200
      - TRANS_DB_CONN=postgres://postgres:postgres@db:5432/trans?sslmode=disable
      - AUTH_ADDR=auth:50051
      - USER_ADDR=auth:50051
      - WALLET_ADDR=wallet:50053
      - KAFKA_BROKERS=kafka:9092
      - VICTORIA_LOGS_URL=http://victorialogs:9428
      - OTLP_ENDPOINT=http://victoriatraces:10428/insert/opentelemetry/v1/traces
    depends_on:
      - db
      - wallet
      - auth
      - bao-init
      - kafka
      - victorialogs
      - victoriatraces

  wallet:
    image: slayersv/wallet:latest
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: wallet
    environment:
      - BAO_ADDR=http://openbao:8200
      - WALLET_DB_CONN=postgres://postgres:postgres@db:5432/wallet?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - VICTORIA_LOGS_URL=http://victorialogs:9428
      - OTLP_ENDPOINT=http://victoriatraces:10428/insert/opentelemetry/v1/traces
    depends_on:
      - db
      - bao-init
      - kafka
      - victorialogs
      - victoriatraces

  front:
    image: slayersv/frontend:latest
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_ADDR=gateway:8081
      - VICTORIA_LOGS_URL=http://victorialogs:9428
      - OTLP_ENDPOINT=http://victoriatraces:10428/insert/opentelemetry/v1/traces
    depends_on:
      - gateway
    volumes:
      - ./internal/front/templates:/app/internal/front/templates

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    command:
      - "-promscrape.config=/etc/victoriametrics/scrape.yml"
    volumes:
      - ./scrape.yml:/etc/victoriametrics/scrape.yml
      - vm_data:/victoria-metrics-data

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    ports:
      - "9428:9428"
    volumes:
      - vlogs_data:/victoria-logs-data

  victoriatraces:
    image: victoriametrics/victoria-traces:latest
    ports:
      - "10428:10428"
    volumes:
      - vtraces_data:/victoria-traces-data

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000" # Доступна по http://localhost:3001
    depends_on:
      - victoriametrics
      - victorialogs
      - victoriatraces
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  db_data:
  vm_data:
  vlogs_data:
  vtraces_data:
  grafana_data: