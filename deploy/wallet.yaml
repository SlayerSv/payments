apiVersion: v1
kind: Service
metadata:
  name: wallet
spec:
  selector:
    app: wallet-app
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
    - name: metrics
      port: 9090
      targetPort: 9090

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallet-app
  template:
    metadata:
      labels:
        app: wallet-app
    spec:
      nodeSelector:
        nodetype: apps
      containers:
        - name: wallet
          image: slayersv/wallet:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50053
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: payment-config
          env:
            - name: WALLET_DB_CONN
              value: "postgres://postgres:postgres@db-service:5432/wallet?sslmode=disable"
