apiVersion: v1
kind: Service
metadata:
  name: openbao-service
spec:
  selector:
    app: openbao
  ports:
    - port: 8200
      targetPort: 8200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbao
  template:
    metadata:
      labels:
        app: openbao
    spec:
      containers:
        - name: openbao
          image: openbao/openbao:2.5.3
          args: ["server", "-dev", "-dev-root-token-id=myroot"]
          ports:
            - containerPort: 8200
          env:
            - name: BAO_DEV_ROOT_TOKEN_ID
              value: "myroot"