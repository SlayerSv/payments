apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway-app
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
    - name: metrics
      port: 9090
      targetPort: 9090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-app
  template:
    metadata:
      labels:
        app: gateway-app
    spec:
      containers:
        - name: gateway
          image: slayersv/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: payment-config
          env:
            - name: AUTH_ADDR
              value: "auth:50051"
            - name: USER_ADDR
              value: "auth:50051"
            - name: TRANS_ADDR
              value: "trans:50052"
            - name: WALLET_ADDR
              value: "wallet:50053"