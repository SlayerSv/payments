apiVersion: v1
kind: Service
metadata:
  name: auth
spec:
  selector:
    app: auth-app
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 9090
      targetPort: 9090

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-app
  template:
    metadata:
      labels:
        app: auth-app
    spec:
      nodeSelector:
        nodetype: apps
      containers:
        - name: auth
          image: slayersv/auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: payment-config
          env:
            - name: AUTH_DB_CONN
              value: "postgres://postgres:postgres@db-service:5432/auth?sslmode=disable"
