apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-scrape-config
data:
  scrape.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'microservices-metrics'
        static_configs:
          - targets:
            - 'gateway:8081'
            - 'auth:9090'
            - 'trans:9090'
            - 'wallet:9090'
---

apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
spec:
  selector:
    app: victoriametrics
  ports:
    - port: 8428
      targetPort: 8428
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:latest
          args: ["-promscrape.config=/etc/victoriametrics/scrape.yml"]
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: config-volume
              mountPath: /etc/victoriametrics
      volumes:
        - name: config-volume
          configMap:
            name: vm-scrape-config
---

