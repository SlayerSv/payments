apiVersion: v1
kind: Service
metadata:
  name: front
spec:
  type: NodePort
  selector:
    app: front-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-app
  template:
    metadata:
      labels:
        app: front-app
    spec:
      containers:
        - name: front
          image: slayersv/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: payment-config
          volumeMounts:
                - name: html-volume
                  mountPath: /app/internal/front/templates
      volumes:
        - name: html-volume
          configMap:
            name: frontend-templates
