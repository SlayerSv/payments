{{define "layout"}}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}}</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; max-width: 980px; margin: 0 auto; padding: 24px; line-height: 1.45; }
        header, section, nav, article { margin-bottom: 20px; }
        .box { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .col { flex: 1 1 280px; }
        input, button { padding: 10px 12px; font: inherit; }
        input { width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background-color: #0b66c3; color: white; border: none; border-radius: 6px; }
        button:hover { background-color: #09529b; }
        a { color: #0b66c3; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .err { background: #fff4f4; border: 1px solid #f1b2b2; padding: 10px 12px; border-radius: 10px; margin: 12px 0; color: #cc0000; }
        .muted { color: #666; }
        .tabs a { margin-right: 12px; font-weight: 500; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f9f9f9; }
        .actions form { display: grid; gap: 10px; margin-top: 10px; }
        label { font-weight: 500; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>
    <header class="box">
        <div class="row" style="justify-content: space-between; align-items: center">
            <strong>MyBank Frontend</strong>
            <nav class="tabs">
                {{if .Authed}}
                    <a href="/me">Профиль</a>
                    <a href="/me/accounts">Счета</a>
                    <a href="/logout">Выйти</a>
                {{else}}
                    <a href="/login">Вход</a>
                    <a href="/register">Регистрация</a>
                    <a href="/restore">Восстановление</a>
                {{end}}
            </nav>
        </div>
    </header>

    <main class="box">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
